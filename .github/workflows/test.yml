---
name: tests

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:  # Test each python and Qt-lib only once on each os.
        os: [ubuntu-latest, macOS-latest, windows-latest]
        py: ['3.10', '3.11', '3.12', '3.13', '3.14']
        include:
          - {py: '3.10', qt: PySide6-Essentials}
          - {py: '3.11', qt: PyQt6}
          - {py: '3.12', qt: PySide6-Essentials}
          - {py: '3.13', qt: PySide6-Essentials}
          - {py: '3.14', qt: PySide6-Essentials}
    runs-on: ${{ matrix.os }}
    name: pytest (${{ matrix.os }}, ${{ matrix.py }}, ${{ matrix.qt }})
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6
      - uses: tlambert03/setup-qt-libs@v1
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.py }}
          enable-cache: true
          cache-suffix: ${{ matrix.qt }}
      - run: uv sync --group github-actions --group test
      - run: uv pip install -U ${{ matrix.qt }}

      - run: >-
          uv run pytest tests --color=yes
          --cov=qdarktheme
          --cov=tests
          --cov-report=term-missing
          --cov-report=xml

      - uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Capture WidgetGallery img
        run: >-
          uv run python ./tools/capture.py
          --name ${{runner.os}}-py${{matrix.py}}-${{matrix.qt}}

      - uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ runner.os }}-py${{ matrix.py }}-${{ matrix.qt }}
          path: ./*.png

  pytest-without-qt:
    strategy:
      fail-fast: false
      matrix:  # Python version does not affect tests without Qt.
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'
          enable-cache: true
      - run: uv sync --group github-actions --group test

      - run: >-
          uv run pytest --color=yes
          --cov=qdarktheme
          --cov=tests
          --cov-report=term-missing
          --cov-report=xml
          --ignore=tests/test_widget_gallery.py
          --ignore=tests/test_qdarktheme_with_qt.py
          -p no:pytest-qt

      - uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  PyInstaller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'
          enable-cache: true
      - run: uv sync
      - run: uv pip install -U PyInstaller

      - name: Make test file
        run: |
          cat <<'EOL' >> test.py
          import qdarktheme
          qdarktheme.load_stylesheet('auto')
          EOL
          cat -n test.py

      - run: uv run python -m PyInstaller test.py -n test_app -F
      - run: ./dist/test_app
